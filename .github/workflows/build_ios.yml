name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install macOS dependencies
      run: |
        brew install autoconf automake libtool pkg-config
        brew install sdl2 sdl2_image sdl2_ttf sdl2_mixer sdl2_gfx
    
    - name: Install Python dependencies
      run: |
        pip install cython==3.0.10
        pip install kivy
        pip install pyinstaller
    
    - name: Clone kivy-ios
      run: |
        git clone https://github.com/kivy/kivy-ios
        cd kivy-ios
        pip install -e .
    
    - name: Build iOS toolchain
      run: |
        cd kivy-ios
        toolchain build python3 kivy
    
    - name: Create iOS project
      run: |
        cd kivy-ios
        toolchain create Laba29 ${{ github.workspace }}
    
    - name: Upload iOS project
      uses: actions/upload-artifact@v4
      with:
        name: Laba29-iOS-Project
        path: kivy-ios/Laba29-ios/
